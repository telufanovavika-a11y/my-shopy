<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(120deg, #fff7ed, #ffe4d6);
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

button {
  background: black;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

.cart {
  margin-top: 40px;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.controls button {
  padding: 5px 10px;
  margin: 0 3px;
}

.remove {
  background: #ff4d4d;
}
</style>
</head>

<body>

<h1>Магазин</h1>

<div class="products">
  <div class="product">
    <h3>Товар 1</h3>
    <p>100 грн</p>
    <button onclick="addToCart('Товар 1', 100)">В корзину</button>
  </div>

  <div class="product">
    <h3>Товар 2</h3>
    <p>150 грн</p>
    <button onclick="addToCart('Товар 2', 150)">В корзину</button>
  </div>
</div>

<div class="cart">
  <h2>Корзина 🛒</h2>
  <div id="cart"></div>
  <h3>Итого: <span id="total">0</span> грн</h3>
</div>

<script>
let cart = {};

function addToCart(name, price) {
  if (!cart[name]) {
    cart[name] = { price: price, qty: 1 };
  } else {
    cart[name].qty++;
  }
  renderCart();
}

function changeQty(name, delta) {
  cart[name].qty += delta;
  if (cart[name].qty <= 0) delete cart[name];
  renderCart();
}

function removeItem(name) {
  delete cart[name];
  renderCart();
}

function renderCart() {
  let cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;

  for (let name in cart) {
    let item = cart[name];
    total += item.price * item.qty;

    let div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <span>${name} (${item.price} грн)</span>
      <div class="controls">
        <button onclick="changeQty('${name}', -1)">−</button>
        ${item.qty}
        <button onclick="changeQty('${name}', 1)">+</button>
        <button class="remove" onclick="removeItem('${name}')">❌</button>
      </div>
    `;

    cartDiv.appendChild(div);
  }

  document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
