<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магазин Chileer</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(120deg, #fff7ed, #ffe4d6);
  margin: 0;
  padding: 20px;
}
h1, h2 {
  text-align: center;
}
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}
.product {
  background: white;
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}
.product img {
  width: 100%;
  border-radius: 12px;
}
.product ul {
  text-align: left;
  padding-left: 20px;
  font-size: 14px;
}
button {
  background: black;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}
.cart {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 40px;
}
.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.cart-item img {
  width: 50px;
  border-radius: 8px;
  margin-right: 10px;
}
.controls button {
  padding: 5px 10px;
  margin: 0 3px;
}
.remove {
  background: #ff4d4d;
}
form {
  background: white;
  padding: 20px;
  border-radius: 16px;
}
form input, form textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}
form button {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>Магазин Chileer</h1>

<div class="products" id="productList"></div>

<button onclick="addMultipleFlavors()">Добавити всі смаки</button>

<div class="cart">
  <h2>Корзина 🛒</h2>
  <div id="cart"></div>
  <h3>Итого: <span id="total">0</span> грн</h3>
</div>

<h2>Оформлення заказа</h2>
<form id="orderForm" action="https://formspree.io/f/xqegerjw" method="POST">
  <input type="text" name="name" placeholder="Ім'я" required>
  <input type="tel" name="phone" placeholder="Телефон" required>
  <textarea name="address" placeholder="Адрес" required></textarea>
  <input type="hidden" name="order" id="orderDetails">
  <button type="submit">Вілправити заказ</button>
</form>

<script>
// Список товаров с фото
const products = [
  {name: "Chileer Банан 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім банановим соком", volume: "330 мл", flavor: "Банан", img: "https://i.ibb.co/GvF1m44k/21-20260328140417.png"},
  {name: "Chileer Вишня 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою вишнею", volume: "330 мл", flavor: "Вишня", img: "https://i.ibb.co/qLHrm9tr/21-20260328140404.png"},
  {name: "Chileer Ожина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою ожиною", volume: "330 мл", flavor: "Ожиною", img: "https://i.ibb.co/1C5C0kQ/21-20260328140355.png"},
  {name: "Chileer Чорниця 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою чорницею", volume: "330 мл", flavor: "Чорниця", img: "https://i.ibb.co/QFMKNGn0/21-20260328140408.png"},
  {name: "Chileer Апельсин 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім апельсиновим соком", volume: "330 мл", flavor: "Апельсин", img: "https://i.ibb.co/Nd6fbL4M/21-20260328140350.png"},
  {name: "Chileer Полуниця 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою полуницею", volume: "330 мл", flavor: "Полуниця", img: "https://i.ibb.co/B2xxnzqD/21-20260328140400.png"},
  {name: "Chileer Виноград 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім соком винограду", volume: "330 мл", flavor: "Виноград", img: "https://i.ibb.co/tpBrdy7r/21-20260328140412.png"},
  {name: "Chileer Малина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою малиною", volume: "330 мл", flavor: "Малина", img: "https://i.ibb.co/8n7WmnFM/21-20260328140345-1.png"},
  {name: "Chileer Слива та смородина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою сливою та смородиною", volume: "330 мл", flavor: "Слива та смородина", img: "https://i.ibb.co/nMB6YHBF/21-20260328140340.png"}
];

let cart = {};

// Генерация товаров на странице
const productList = document.getElementById("productList");
products.forEach(p => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${p.img}" alt="${p.name}">
    <h3>${p.name}</h3>
    <p>${p.price} грн</p>
    <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">В корзину</button>
    <p>${p.desc}</p>
    <ul>
      <li>Об’єм: ${p.volume}</li>
      <li>Смак: ${p.flavor}</li>
      <li>Тип: безалкогольний напій</li>
      <li>Призначення: для дітей та всієї родини</li>
    </ul>
  `;
  productList.appendChild(div);
});

// Функции корзины
function addToCart(name, price, img) {
  if (!cart[name]) cart[name] = { price: price, qty: 1, img: img };
  else cart[name].qty++;
  renderCart();
}

function addMultipleFlavors() {
  products.forEach(p => addToCart(p.name, p.price, p.img));
}

function changeQty(name, delta) {
  cart[name].qty += delta;
  if (cart[name].qty <= 0) delete cart[name];
  renderCart();
}

function removeItem(name) {
  delete cart[name];
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;
  let orderText = "";

  for (let name in cart) {
    let item = cart[name];
    total += item.price * item.qty;
    orderText += `${name} x${item.qty} (${item.price*item.qty} грн)\n`;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${item.img}" alt="${name}">
      <span>${name} (${item.price} грн)</span>
      <div class="controls">
        <button onclick="changeQty('${name}', -1)">−</button>
        ${item.qty}
        <button onclick="changeQty('${name}', 1)">+</button>
        <button class="remove" onclick="removeItem('${name}')">❌</button>
      </div>
    `;
    cartDiv.appendChild(div);
  }

  document.getElementById("total").textContent = total;
  document.getElementById("orderDetails").value = orderText;
}
</script>

</body>
</html>
