<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chileer Shop</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f8f8f8;
  padding: 20px;
}

h1 {
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-bottom: 30px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: black;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  margin-top: 8px;
  cursor: pointer;
}

.cart {
  position: fixed;
  right: 20px;
  top: 20px;
  width: 300px;
  max-height: 80vh;
  overflow-y: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.cart-item {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.cart-item img {
  width: 50px;
  margin-right: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>Chileer — напої для дітей</h1>

<div class="products" id="productList"></div>

<div class="cart">
  <h2>Корзина 🛒</h2>
  <div id="cart"></div>
  <h3>Итого: <span id="total">0</span> грн</h3>
</div>
  <h2>Оформление заказа</h2>

<form action="https://formspree.io/f/xqegerjw" method="POST">
  <input type="text" name="name" placeholder="Ваше имя" required>
  <input type="email" name="email" placeholder="Email" required>
  <textarea name="address" placeholder="Адрес доставки" required></textarea>

  <input type="hidden" name="order" id="orderDetails">

  <button type="submit">Оформить заказ</button>
</form>

<script>
// 9 товаров
const products = [
  {name: "Chileer Банан 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім банановим соком", volume: "330 мл", flavor: "Банан", img: "https://i.ibb.co/GvF1m44k/21-20260328140417.png"},
  {name: "Chileer Вишня 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою вишнею", volume: "330 мл", flavor: "Вишня", img: "https://i.ibb.co/qLHrm9tr/21-20260328140404.png"},
  {name: "Chileer Ожина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою ожиною", volume: "330 мл", flavor: "Ожиною", img: "https://i.ibb.co/1C5C0kQ/21-20260328140355.png"},
  {name: "Chileer Чорниця 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою чорницею", volume: "330 мл", flavor: "Чорниця", img: "https://i.ibb.co/QFMKNGn0/21-20260328140408.png"},
  {name: "Chileer Апельсин 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім апельсиновим соком", volume: "330 мл", flavor: "Апельсин", img: "https://i.ibb.co/Nd6fbL4M/21-20260328140350.png"},
  {name: "Chileer Полуниця 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою полуницею", volume: "330 мл", flavor: "Полуниця", img: "https://i.ibb.co/B2xxnzqD/21-20260328140400.png"},
  {name: "Chileer Виноград 330ml", price: 75, desc: "Смачний та корисний напій зі справжнім соком винограду", volume: "330 мл", flavor: "Виноград", img: "https://i.ibb.co/tpBrdy7r/21-20260328140412.png"},
  {name: "Chileer Малина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою малиною", volume: "330 мл", flavor: "Малина", img: "https://i.ibb.co/8n7WmnFM/21-20260328140345-1.png"},
  {name: "Chileer Слива та смородина 330ml", price: 75, desc: "Смачний та корисний напій зі справжньою сливою та смородиною", volume: "330 мл", flavor: "Слива та смородина", img: "https://i.ibb.co/nMB6YHBF/21-20260328140340.png"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};

// Получение товара из ссылки
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const price = params.get("price");
const img = params.get("img");

if (name && price && img) {
  if (!cart[name]) {
    cart[name] = { price: Number(price), qty: 1, img: img };
  } else {
    cart[name].qty++;
  }
}

// Отображение товаров
const productList = document.getElementById("productList");

products.forEach(p => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>${p.price} грн</p>
    <p>${p.desc}</p>
    <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">В корзину</button>
  `;
  productList.appendChild(div);
});

// Функции корзины
function addToCart(name, price, img) {
  if (!cart[name]) cart[name] = { price, qty: 1, img };
  else cart[name].qty++;
  renderCart();
}

function changeQty(name, delta) {
  cart[name].qty += delta;
  if (cart[name].qty <= 0) delete cart[name];
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;

  for (let name in cart) {
    let item = cart[name];
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${item.img}">
      <span>${name}</span>
      <div>
        <button onclick="changeQty('${name}', -1)">−</button>
        ${item.qty}
        <button onclick="changeQty('${name}', 1)">+</button>
      </div>
    `;
    cartDiv.appendChild(div);
  }

  document.getElementById("total").textContent = total;
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;

  for (let name in cart) {
    let item = cart[name];
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <img src="${item.img}">
      <span>${name}</span>
      <div>
        <button onclick="changeQty('${name}', -1)">−</button>
        ${item.qty}
        <button onclick="changeQty('${name}', 1)">+</button>
      </div>
    `;
    cartDiv.appendChild(div);
  }

  document.getElementById("total").textContent = total;
  localStorage.setItem("cart", JSON.stringify(cart));

  updateOrderField(); // 🔥 ВАЖНО
}
</script>

</body>
</html>
